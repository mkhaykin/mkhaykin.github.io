me:
  name: Михаил Хайкин
  intro: |
    Привет, меня зовут Хайкин Михаил.  

    В ИТ более 20 лет: карьеру начинал с разработки производственных систем, позже занимался инфраструктурой и 
    автоматизацией корпоративных ИТ-систем. В последние годы специализируюсь на backend-разработке и data-интеграциях на Python.  

    Мои сильные стороны:  
    \- системное и инженерное мышление;  
    \- проектирование и разработка интеграционных решений;  
    \- внимание к качеству и поддерживаемости кода;  
    \- умение переводить бизнес-требования в технические решения.  

