            \- реализация паттерна "репозиторий";  
            \- кеширование данных (декоратор);  
            \- покрытие тестами: pytest;  
            \- решение представлено в виде docker контейнеров.  

            Полное описание решения доступно по ссылке: [solution.md](https://github.com/mkhaykin/pythonYLab/blob/main/solution.md).

          stack: 
            - Python
            - FastAPI
            - Postgres
            - Redis
            - Celery
            - RabbitMQ
            - Google Sheets
          hide:
          

        - title: Проверка качества *.py файлов
          url_demo:
          url_git: https://github.com/mkhaykin/pythonSkyEng
          description: |
            Пользователь загружает python модули, система выполняет проверку кода на соответствие качеству.
            После система извещает пользователя о результатах проверки.

            *Особенности*:  
            \- api реализован на FastApi;  
            \- пользовательский интерфейс на Flask;  
            \- jwt для аутентификации пользователей;  
            \- асинхронная реализация;  
            \- pre-commit для проверки пользовательских файлов.  
          stack: 
            - Python
            - FastAPI
            - Flask
            - Celery
            - Postgres
            - Alembic
            - JWT

        - title: Парсинг авито
          url_demo: 
          url_git: https://github.com/mkhaykin/pythonAvitoFastApi/
          description: |
            Пользователь формирует запрос на сбор информации о количестве интересующих объявлений для определенного региона и категории.
            С определенной периодичностью система опрашивает мобильное api avito и сохраняет данные о количестве объявлений. 
            По коду запроса клиент может получить статистику объявлений.

            *Особенности*:  
            \- api реализован на FastApi;  
            \- асинхронная реализация;  
            \- для преодоления блокировок avito используется сеть Tor.
          stack:
            - Python
            - FastAPI
            - Celery
            - Postgres
            - Tor

