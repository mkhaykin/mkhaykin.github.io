experience:
  title: Опыт работы
  intro: |
    Основные направления работы:  
    \- Apache Airflow и ETL-процессы;  
    \- backend-сервисы на FastAPI;  
    \- PostgreSQL / Greenplum;  
    \- интеграция внешних API;  
    \- потоковая и batch-обработка данных;  
    \- автоматизация и генерация отчетности.  
  list:
    - position: Data Engineer (инженер данных / python)
      company: Цифромед, ООО
      duration: Январь 2025 &mdash; настоящее время
      summary: |
        Разработка ETL-платформы и сервисов интеграции данных для корпоративных систем.  

        Задачи:  
        \- разрабатывал и сопровождал ETL-процессы на Apache Airflow для интеграции данных между БД, внешними API и внутренними системами;  
        \- разрабатывал генерацию аналитической и отчетной документации;  
        \- участвовал в миграции legacy bash-автоматизации в Airflow DAG’и;  
        \- выполнял рефакторинг и поддержку legacy-кода.

        Что делал:  
        \- cоздал внутренний Python-фреймворк для высокопроизводительной потоковой синхронизации данных:  
        &emsp;\- передача данных без использования диска;  
        &emsp;\- ring buffer в памяти;  
        &emsp;\- многопоточная обработка и batch-загрузка;  
        &emsp;\- система метрик и расширенного логирования;  
        &emsp;\- тестирование с использованием pytest и testcontainers.  
        \- разрабатывал ETL-процессы в Apache Airflow для загрузки и обработки данных из внешних API (НСИ, Минздрав):  
        &emsp;\- реализовал механизм промежуточного хранения данных с поддержкой нескольких backend’ов (S3/MinIO, WebDAV, SMB/Samba);  
        \- реализовал механизм full-scan сверки данных между БД с использованием серверных курсоров и merge-алгоритма по primary key;  
        \- разрабатывал FastAPI-сервисы для интеграции с внутренними API;  
        \- разработал прототип мониторинга ETL-процессов и алертинга через Zabbix:  
        &emsp;\- FastAPI-сервис;  
        &emsp;\- Zabix-template.  

        Стек: Python 3.7–3.10, Apache Airflow (2.3.3 - 2.10.5), Kafka, PostgreSQL, Greenplum, SQLAlchemy, pandas, openpyxl, FastAPI, pytest, testcontainers, Zabbix.

    - position: Python R&D Developer (python-разработчик) 
      company: ПИЭФФ, ООО
      duration: Июнь 2024 &mdash; Ноябрь 2024
      summary: |
        Разработка прототипа системы календарного планирования производства и отгрузок для нефтегазового сектора.  
          
        Что делал:  
        \- разрабатывал модель календарного планирования производственных процессов и отгрузок;  
        \- реализовывал алгоритмы формирования производственных графиков и сценарного моделирования;  
        \- участвовал в проектировании архитектуры прототипа и подготовке технической документации;  
        \- формализовывал бизнес-логику производственного планирования совместно с предметными специалистами;  
        \- подготовил техническую документацию и архитектурное описание прототипа (System Design) для последующей передачи проекта в промышленную разработку.  

        Стек: Python 3.10.  

    - position: Python Backend Developer (backend-разработчик)
      company: РВО софт
      duration: Январь 2023 &mdash; Июнь 2024
      summary: |
        Разработка backend-сервисов, ETL-интеграций и внутренних web-приложений.  
        
        Что делал:  
        \- разрабатывал backend-сервисы на FastAPI и Flask;  
        \- реализовывал ETL-интеграции между 1С (OData) и внешними системами;  
        \- разрабатывал REST API и сервисы фоновой обработки задач (Celery + RabbitMQ/Redis);  
        \- разрабатывал внутренние web-приложения и административные интерфейсы;  
        \- разрабатывал Telegram-ботов для автоматизации внутренних процессов.  

        Стек: Python 3.8–3.10, FastAPI, Flask, SQLAlchemy, PostgreSQL, Redis, MongoDB, Celery, RabbitMQ, Docker, aiogram.

    # Freelance - Developer
    - position: Python Automation Engineer (разработчик / инженер по автоматизации )
      company: freelance
      duration: Январь 2022 &mdash; Декабрь 2022
      summary: |
        Разработка небольших backend- и automation-решений на Python.  

        Что делал:  
        \- разрабатывал web-приложения и внутренние сервисы на Flask;  
        \- реализовал систему опросов пользователей;  
        \- участвовал в pre-sale проработке интеграции OnlyOffice;  
        \- разрабатывал утилиты миграции и автоматизации для Microsoft Exchange;  
        \- создавал desktop-утилиты и сервисные инструменты на Python/Tkinter.  

        Стек: Python 3.8+, Flask, Tkinter.  

    # Freelance
    - position: Infrastructure Engineer (ИТ консультант / инженер по инфраструктуре)
      company: 
      duration: Август 2010 &mdash; Март 2023
      summary: |
        Проектирование, развитие и сопровождение ИТ-инфраструктуры для производственных и розничных компаний.
        
        Что делал:  
        \- поддерживал распределенную инфраструктуру (до 270 рабочих мест, несколько филиалов);  
        \- администрировал Windows/Linux инфраструктуру, сетевое оборудование Cisco и системы 1С;  
        \- автоматизировал задачи администрирования и аудита с использованием PowerShell и Python;  
        \- разрабатывал внутренние инструменты для:  
        &emsp;\- аудита инфраструктуры;  
        &emsp;\- сбора и обработки данных;  
        &emsp;\- автоматизации рутинных операций.  
        \- выполнял аудит производительности и оценку развития ИТ-инфраструктуры компаний;  
        \- участвовал в планировании развития ИТ-систем и внутренних процессов.  

        Стек: Windows Server, Linux, Cisco, PowerShell, Python, 1С.

    # Сommercial companies
    - position: IT Infrastructure Manager (директор по ИТ / системный администратор)
      company: коммерческие компании (3)
      duration: Декабрь, 2004 &mdash; Август, 2010
      summary: |
        Развитие и сопровождение корпоративной ИТ-инфраструктуры в коммерческих компаниях.  

        Что делал:  
        \- администрировал и развивал Windows-инфраструктуру и корпоративные сервисы Microsoft (Exchange, ISA Server, Sharepoint и др.);  
        \- работал как самостоятельно, так и в составе инженерных команд;  
        \- руководил инженерной группой до 7 человек;  
        \- участвовал в автоматизации инфраструктурных и административных процессов.  

    # Developer (КЗАЛ)
    - position: Development Team Lead (Руководитель разработки / Программист)
      company: КЗАЛ, ООО
      duration: Август, 2000 &mdash; Декабрь, 2004
      summary: |
        Разработка системы управления производством машиностроительного предприятия (мелкосерийное станкостроение).  

        Что делал:  
        \- проектировал архитектуру и модели данных производственной системы;  
        \- разрабатывал БД и бизнес-логику на MS SQL Server (T-SQL, хранимые процедуры, триггеры, функции);  
        \- выполнял прототипирование и проверку бизнес-гипотез;  
        \- использовал BPwin/ERwin для моделирования процессов и структуры данных;  
        \- руководил небольшой группой разработки.  

    # Developer (Генезис)
    - position: программист
      company: Генезис, ЗАО
      duration: Август, 1997 &mdash; Август, 2000
      summary: |
        Поддержка складской системы (FoxPro), участие в автоматизации складских процессов и внедрении Oracle Applications.  
      hide: true


